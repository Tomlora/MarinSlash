name: Apply LoL records patch

on:
  push:
    branches:
      - agent/add-lol-records

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply record changes
        run: python .github/apply_records.py

      - name: Validate Python syntax
        run: |
          python -m compileall -q \
            cogs/recordslol.py \
            cogs/leagueoflegends.py \
            fonctions/match/timeline.py \
            utils/emoji.py

      - name: Commit generated changes
        run: |
          rm -f .github/apply_records.py .github/workflows/apply-records.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cogs/recordslol.py cogs/leagueoflegends.py fonctions/match/timeline.py utils/emoji.py .github
          git commit -m "Add LoL record tracking"
          git push origin HEAD:${GITHUB_REF_NAME}
